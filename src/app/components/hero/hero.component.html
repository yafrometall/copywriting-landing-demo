<section class="hero">
  <div class="hero-content">
    <span class="badge">🔥 Oferta de Lanzamiento</span>
    <h1 class="hero-title">TechFit X1</h1>
    <p class="hero-subtitle">El smartwatch deportivo que lleva tu rendimiento al siguiente nivel</p>
    <ul class="hero-highlights">
      <li>💓 Monitoreo de ritmo cardíaco</li>
      <li>🩸 Oxígeno en sangre (SpO2)</li>
      <li>📍 GPS integrado</li>
      <li>🔋 Batería de hasta 7 días</li>
    </ul>
    <div class="hero-cta">
      <span class="price">$89 <small>USD</small></span>
      <button class="btn-primary" (click)="scrollToPricing()">
        ¡Comprar Ahora!
      </button>
    </div>
    <p class="hero-note">🚚 Envío gratis · ✅ Garantía de 30 días</p>
  </div>
  <div class="hero-image">
    <div class="watch-placeholder">
      <div class="watch-face">
        <span class="watch-time">{{ currentTime }}</span>
        <span class="watch-metric">❤️ 72 BPM</span>
      </div>
    </div>
  </div>
</section>
