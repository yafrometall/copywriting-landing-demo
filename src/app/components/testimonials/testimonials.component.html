<section class="testimonials" id="testimonials">
  <div class="testimonials-header">
    <h2 class="section-title">Lo que dicen nuestros usuarios</h2>
    <p class="section-subtitle">Miles de atletas ya confían en el TechFit X1</p>
  </div>
  <div class="testimonials-grid">
    @for (testimonial of testimonials; track testimonial.name) {
      <div class="testimonial-card">
        <div class="testimonial-header">
          <div class="avatar">{{ testimonial.avatar }}</div>
          <div class="user-info">
            <h4 class="user-name">{{ testimonial.name }}</h4>
            <span class="user-role">{{ testimonial.role }}</span>
          </div>
        </div>
        <div class="rating">
          @for (star of [1, 2, 3, 4, 5]; track star) {
            <span class="star" [class.filled]="star <= testimonial.rating">★</span>
          }
        </div>
        <p class="testimonial-content">"{{ testimonial.content }}"</p>
      </div>
    }
  </div>
</section>
